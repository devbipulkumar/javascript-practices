 <script>
   let calc = (num,add)=>{
     return add(num+5,false);
   }
   let sub = (num,callback)=>{
    return callback(num-3,false)
   }
   let mul = (num,callback1)=>{
       return callback1(num*2,false);
   }
   let div = (num,callback2)=>{
     return callback2(num/2+3,false);
   }
   calc(5,(addRes,error)=>{
       if(!error){
        sub(addRes,(subRes,error)=>{
          if(!error){
            mul(subRes,(mulRes,error)=>{
               if(!error){
                div(mulRes,(divRes,error)=>{
                    if(!error){
                        console.log(divRes);
                    }

                })
               }
            })
          }
        })
       }
   })
 </script>
